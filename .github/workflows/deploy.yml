name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # ffmpeg 설치 (음성 포맷 변환용)
            if ! command -v ffmpeg &>/dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
            fi
            cd /home/bookmart/bookmart
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            # 환경변수 설정 (빈 값이거나 없으면 덮어쓰기)
            sed -i '/^GOOGLE_DRIVE_FOLDER_ID/d' .env 2>/dev/null || true
            echo 'GOOGLE_DRIVE_FOLDER_ID=10xR4x8zjeXCiLqGOXMSD8IRpyWgXlN75' >> .env
            sed -i '/^OPENAI_API_KEY/d' .env 2>/dev/null || true
            echo 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' >> .env
            sudo systemctl restart bookmart
            # 에러 로그 확인 (1회성)
            python debug_inbox.py 2>&1 || true
            rm -f debug_inbox.py
            # 5분마다 메일 자동 수신 cron 등록 (sh 호환: source 대신 . 사용)
            CRON_CMD="cd /home/bookmart/bookmart && . venv/bin/activate && python manage.py fetch_emails >> /home/bookmart/fetch_emails.log 2>&1"
            (crontab -l 2>/dev/null | grep -v 'fetch_emails' ; echo "*/5 * * * * $CRON_CMD") | crontab -
            # 5분마다 통화녹음 Google Drive 동기화 + 자동 파싱
            CALL_CMD="cd /home/bookmart/bookmart && . venv/bin/activate && python manage.py sync_call_recordings --process >> /home/bookmart/call_sync.log 2>&1"
            (crontab -l 2>/dev/null | grep -v 'sync_call_recordings' ; echo "*/5 * * * * $CALL_CMD") | crontab -
            # ── 1회성 진단 (다음 배포에서 제거) ──
            python -c "
import os; os.environ.setdefault('DJANGO_SETTINGS_MODULE','config.settings')
import django; django.setup()
from orders.management.commands.sync_call_recordings import get_drive_service
from django.conf import settings
service = get_drive_service()
if not service:
    print('ERROR: Drive service failed')
else:
    fid = settings.GOOGLE_DRIVE_FOLDER_ID
    print(f'Folder ID: {fid}')
    # 모든 파일 (MIME 필터 없이)
    r = service.files().list(q=f\"'{fid}' in parents and trashed=false\", fields='files(id,name,mimeType,size)', pageSize=10).execute()
    files = r.get('files', [])
    print(f'Total files in folder: {len(files)}')
    for f in files[:10]:
        print(f'  {f[\"name\"]} | {f.get(\"mimeType\",\"?\")} | {f.get(\"size\",\"?\")} bytes')
    # audio/video 필터
    r2 = service.files().list(q=f\"'{fid}' in parents and trashed=false and (mimeType contains 'audio/' or mimeType contains 'video/')\", fields='files(id,name,mimeType)', pageSize=10).execute()
    files2 = r2.get('files', [])
    print(f'Audio/Video files: {len(files2)}')
    for f in files2[:10]:
        print(f'  {f[\"name\"]} | {f.get(\"mimeType\",\"?\")}')
    # 이미 동기화된 건수
    from orders.models import CallRecording
    existing = CallRecording.objects.filter(gdrive_file_id__gt='').count()
    print(f'Already synced: {existing}')
" 2>&1 || true
