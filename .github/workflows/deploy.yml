name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/bookmart/bookmart
            echo "=== .env ==="
            cat .env 2>/dev/null || echo "NO .env FILE"
            echo "=== nginx ==="
            grep -r 'server_name\|proxy_pass' /etc/nginx/ 2>/dev/null | head -20
            echo "=== systemd ==="
            cat /etc/systemd/system/bookmart.service 2>/dev/null | head -30
            echo "=== END DEBUG ==="
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart bookmart
            # 5분마다 메일 자동 수신 cron 등록
            CRON_CMD="cd /home/bookmart/bookmart && source venv/bin/activate && python manage.py fetch_emails >> /home/bookmart/fetch_emails.log 2>&1"
            (crontab -l 2>/dev/null | grep -v 'fetch_emails' ; echo "*/5 * * * * $CRON_CMD") | crontab -
