name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/bookmart/bookmart
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            # GOOGLE_DRIVE_FOLDER_ID 설정 (.env에 없으면 추가)
            grep -q 'GOOGLE_DRIVE_FOLDER_ID' .env 2>/dev/null || echo 'GOOGLE_DRIVE_FOLDER_ID=10xR4x8zjeXCiLqGOXMSD8IRpyWgXlN75' >> .env
            sudo systemctl restart bookmart
            # 5분마다 메일 자동 수신 cron 등록 (sh 호환: source 대신 . 사용)
            CRON_CMD="cd /home/bookmart/bookmart && . venv/bin/activate && python manage.py fetch_emails >> /home/bookmart/fetch_emails.log 2>&1"
            (crontab -l 2>/dev/null | grep -v 'fetch_emails' ; echo "*/5 * * * * $CRON_CMD") | crontab -
            # 5분마다 통화녹음 Google Drive 동기화 + 자동 파싱
            CALL_CMD="cd /home/bookmart/bookmart && . venv/bin/activate && python manage.py sync_call_recordings --process >> /home/bookmart/call_sync.log 2>&1"
            (crontab -l 2>/dev/null | grep -v 'sync_call_recordings' ; echo "*/5 * * * * $CALL_CMD") | crontab -
