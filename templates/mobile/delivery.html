<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배송 관리 - 북마트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Malgun Gothic', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
    }
    .top-bar {
      background: #1e40af;
      color: #fff;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .top-bar .count {
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
    }
    .region-group {
      margin: 12px;
    }
    .region-title {
      font-size: 15px;
      font-weight: 700;
      color: #475569;
      padding: 8px 4px;
      border-bottom: 2px solid #cbd5e1;
      margin-bottom: 8px;
    }
    .order-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .order-card.selected {
      border-color: #2563eb;
      background: #eff6ff;
    }
    .order-check {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      accent-color: #2563eb;
    }
    .order-info {
      flex: 1;
      min-width: 0;
    }
    .order-school {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .order-detail {
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }
    .order-detail .location {
      color: #e8720c;
      font-weight: 600;
    }
    .order-phone {
      flex-shrink: 0;
    }
    .order-phone a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: #059669;
      color: #fff;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
    }
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .bottom-bar button {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-select-all {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-done {
      background: #059669;
      color: #fff;
    }
    .btn-done:disabled {
      background: #94a3b8;
    }
    .spacer { height: 80px; }
    .empty-msg {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
      font-size: 16px;
    }
    .back-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div>
    <a href="/dashboard/" class="back-link">&larr;</a>
    &nbsp; 배송 관리
  </div>
  <span class="count">{{ total_count }}건</span>
</div>

<form method="post" action="{% url 'mobile_delivery_done' %}" id="deliveryForm">
  {% csrf_token %}

  {% for region_key, group in groups %}
  <div class="region-group">
    <div class="region-title">{{ group.label }} ({{ group.orders|length }}건)</div>
    {% for order in group.orders %}
    <label class="order-card" id="card-{{ order.pk }}">
      <input type="checkbox" name="ids" value="{{ order.pk }}" class="order-check"
             onchange="toggleCard(this, {{ order.pk }}); updateCount()">
      <div class="order-info">
        <div class="order-school">{{ order.delivery.name }}</div>
        <div class="order-detail">
          {% if order.delivery.location_detail %}<span class="location">{{ order.delivery.location_detail }}</span><br>{% endif %}
          {{ order.agency.name }} / {{ order.teacher.name }}<br>
          {{ order.item_count }}종 / {{ order.total_amt|floatformat:0 }}원
          {% if order.tracking_no %}<br>운송장: {{ order.tracking_no }}{% endif %}
        </div>
      </div>
      <div class="order-phone">
        {% if order.teacher.phone %}
        <a href="tel:{{ order.teacher.phone }}" onclick="event.stopPropagation()">&#x1F4DE;</a>
        {% endif %}
      </div>
    </label>
    {% endfor %}
  </div>
  {% empty %}
  <div class="empty-msg">배송중인 주문이 없습니다.</div>
  {% endfor %}

  <div class="spacer"></div>

  <div class="bottom-bar">
    <button type="button" class="btn-select-all" onclick="toggleSelectAll()">전체선택</button>
    <button type="submit" class="btn-done" id="btnDone" disabled
            onclick="return confirm('선택한 주문을 배송완료 처리하시겠습니까?\n선생님께 문자가 발송됩니다.')">
      배송완료 (<span id="selectedCount">0</span>건)
    </button>
  </div>
</form>

<script>
function toggleCard(cb, id) {
  var card = document.getElementById('card-' + id);
  if (cb.checked) card.classList.add('selected');
  else card.classList.remove('selected');
}
function updateCount() {
  var count = document.querySelectorAll('.order-check:checked').length;
  document.getElementById('selectedCount').textContent = count;
  document.getElementById('btnDone').disabled = count === 0;
}
function toggleSelectAll() {
  var boxes = document.querySelectorAll('.order-check');
  var allChecked = Array.from(boxes).every(function(b){ return b.checked; });
  boxes.forEach(function(b){
    b.checked = !allChecked;
    toggleCard(b, b.value);
  });
  updateCount();
}
</script>
</body>
</html>
