<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>비밀번호 설정 — 북마트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', dotum, sans-serif;
      font-size: 13px;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .setup-wrap {
      background: #fff;
      border: 1px solid #ccc;
      width: 340px;
    }
    .setup-header {
      background: #e8720c;
      color: #fff;
      text-align: center;
      padding: 18px 0 14px;
      font-size: 20px;
      font-weight: bold;
    }
    .setup-header span {
      display: block;
      font-size: 12px;
      font-weight: normal;
      opacity: 0.85;
      margin-top: 4px;
    }
    .setup-body { padding: 24px 28px 28px; }
    .welcome {
      background: #f0f7ff;
      border: 1px solid #bdd7f1;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.5;
      color: #1a5276;
    }
    .welcome strong { color: #e8720c; }
    .field-row { margin-bottom: 12px; }
    .field-row label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }
    .field-row input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #bbb;
      font-family: inherit;
      font-size: 13px;
    }
    .field-row input:focus { outline: none; border-color: #e8720c; }
    .error-msg {
      background: #ffd7d7;
      border: 1px solid #f5a5a5;
      color: #a94442;
      font-size: 12px;
      padding: 6px 10px;
      margin-bottom: 12px;
    }
    .info-row {
      background: #f5f5f5;
      padding: 8px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #666;
    }
    .info-row strong { color: #333; }
    .btn-submit {
      width: 100%;
      background: #e8720c;
      color: #fff;
      border: none;
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-submit:hover { background: #d0650b; }
  </style>
</head>
<body>
<div class="setup-wrap">
  <div class="setup-header">
    북마트<span>비밀번호 설정</span>
  </div>
  <div class="setup-body">
    <div class="welcome">
      <strong>{{ user.name }}</strong> 선생님, 환영합니다!<br>
      주문에 사용할 비밀번호를 설정해 주세요.
    </div>

    <div class="info-row">
      아이디: <strong>{{ user.login_id }}</strong>
    </div>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field-row">
        <label>비밀번호</label>
        <input type="password" name="password1" placeholder="4자 이상" autofocus required>
      </div>
      <div class="field-row">
        <label>비밀번호 확인</label>
        <input type="password" name="password2" placeholder="다시 한번 입력" required>
      </div>
      <button type="submit" class="btn-submit">비밀번호 설정 완료</button>
    </form>
  </div>
</div>
</body>
</html>
