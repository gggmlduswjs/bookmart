{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-title">{{ title }}</div>

<div class="content-box" style="max-width:480px">
  <form method="post">
    {% csrf_token %}
    <table class="form-table">
      {% for field in form %}
      <tr>
        <th>{{ field.label }}</th>
        <td>
          {{ field }}
          {% if field.errors %}<div style="color:#a94442;font-size:11px;margin-top:3px">{{ field.errors.0 }}</div>{% endif %}
        </td>
      </tr>
      {% endfor %}
    </table>
    <div style="padding:10px 12px;border-top:1px solid #eee;display:flex;gap:8px">
      <button type="submit" class="btn btn-orange">저장</button>
      <a href="{% url 'delivery_list' %}" class="btn btn-outline">취소</a>
    </div>
  </form>
</div>
{% endblock %}
