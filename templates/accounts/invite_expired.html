<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>링크 만료 — 북마트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', dotum, sans-serif;
      font-size: 13px;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrap {
      background: #fff;
      border: 1px solid #ccc;
      width: 340px;
      text-align: center;
    }
    .header {
      background: #999;
      color: #fff;
      padding: 18px 0 14px;
      font-size: 20px;
      font-weight: bold;
    }
    .body {
      padding: 30px 28px;
      line-height: 1.7;
      color: #555;
    }
    .body p { margin-bottom: 16px; }
    .btn-login {
      display: inline-block;
      background: #e8720c;
      color: #fff;
      text-decoration: none;
      padding: 8px 24px;
      font-size: 13px;
    }
    .btn-login:hover { background: #d0650b; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">북마트</div>
  <div class="body">
    <p>이 초대 링크는 만료되었거나<br>이미 사용된 링크입니다.</p>
    <p>업체 담당자에게 새 초대 링크를<br>요청해 주세요.</p>
    <a href="/login/" class="btn-login">로그인 페이지로</a>
  </div>
</div>
</body>
</html>
