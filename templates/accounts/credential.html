{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-title">{{ title }}</div>

<div class="credential-box">
  <div class="warn">⚠ 이 화면에서만 비밀번호를 확인할 수 있습니다. 지금 바로 카톡/문자로 전달해 주세요.</div>

  <div class="credential-row">
    <span class="label">아이디</span>
    <span class="value">{{ login_id }}</span>
  </div>
  <div class="credential-row">
    <span class="label">초기 비밀번호</span>
    <span class="value" id="pw-text">{{ password }}</span>
    <input type="text" id="cred-text" value="{{ login_id }} / {{ password }}" style="position:absolute;left:-9999px">
    <button class="btn btn-gray btn-sm" id="copy-cred-btn"
      onclick="var inp=document.getElementById('cred-text');inp.style.position='static';inp.select();inp.setSelectionRange(0,99999);document.execCommand('copy');inp.style.position='absolute';inp.style.left='-9999px';this.textContent='복사됨 ✓';this.style.background='#2e7d32';var b=this;setTimeout(function(){b.textContent='복사';b.style.background='';},2000)">복사</button>
  </div>

  <div style="margin-top:18px">
    <a href="{{ back_url }}" class="btn btn-orange">확인 (목록으로)</a>
  </div>
</div>
{% endblock %}
