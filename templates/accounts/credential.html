{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card border-success shadow-sm" x-data="{ copied: false }">
      <div class="card-header bg-success text-white fw-bold">✅ {{ title }}</div>
      <div class="card-body p-4">
        <div class="alert alert-warning">
          ⚠️ <strong>이 화면에서만 비밀번호를 확인할 수 있습니다.</strong><br>
          지금 바로 카톡/문자로 전달해 주세요.
        </div>

        <table class="table table-bordered">
          <tr>
            <th class="bg-light" style="width:40%">아이디</th>
            <td><strong>{{ login_id }}</strong></td>
          </tr>
          <tr>
            <th class="bg-light">초기 비밀번호</th>
            <td>
              <strong id="pw-text">{{ password }}</strong>
              <button
                class="btn btn-sm btn-outline-secondary ms-2"
                onclick="navigator.clipboard.writeText('{{ login_id }} / {{ password }}').then(() => { this.textContent='복사됨 ✓'; this.classList.add('btn-success'); this.classList.remove('btn-outline-secondary'); })"
              >복사</button>
            </td>
          </tr>
        </table>

        <div class="d-grid mt-3">
          <a href="{% url back_url %}" class="btn btn-primary">확인 (목록으로)</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
