{% extends 'simple/base.html' %}
{% block title %}간편주문 - {{ agency.name }}{% endblock %}

{% block content %}
<div class="simple-card">
  <h2>교재 주문</h2>
  <p style="color:#64748b;font-size:13px;margin-bottom:16px">
    아래 정보를 입력하시면 바로 교재를 주문하실 수 있습니다.
  </p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>이름 *</label>
      <input type="text" name="name" value="{{ request.POST.name|default:'' }}" placeholder="홍길동" required>
    </div>
    <div class="form-group">
      <label>전화번호 *</label>
      <input type="tel" name="phone" value="{{ request.POST.phone|default:'' }}" placeholder="010-1234-5678" required>
    </div>
    <div class="form-group">
      <label>학교명 *</label>
      <input type="text" name="school" value="{{ request.POST.school|default:'' }}" placeholder="OO초등학교" required>
    </div>
    <div class="form-group">
      <label>배송주소 *</label>
      <input type="text" name="address" value="{{ request.POST.address|default:'' }}" placeholder="서울시 강남구 역삼동 123" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">주문하기</button>
  </form>
</div>

<div style="text-align:center;color:#94a3b8;font-size:12px;margin-top:8px">
  이미 주문하셨나요? 전화번호를 입력하시면 기존 정보로 진행됩니다.
</div>
{% endblock %}
