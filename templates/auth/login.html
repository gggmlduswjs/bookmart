<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 — 북마트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', dotum, sans-serif;
      font-size: 13px;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-wrap {
      background: #fff;
      border: 1px solid #ccc;
      width: 320px;
      padding: 0;
    }
    .login-header {
      background: #e8720c;
      color: #fff;
      text-align: center;
      padding: 18px 0 14px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: -1px;
    }
    .login-header span {
      display: block;
      font-size: 11px;
      font-weight: normal;
      opacity: 0.85;
      margin-top: 4px;
    }
    .login-body { padding: 24px 28px 28px; }
    .field-row { margin-bottom: 12px; }
    .field-row label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }
    .field-row input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #bbb;
      font-family: inherit;
      font-size: 13px;
    }
    .field-row input:focus { outline: none; border-color: #e8720c; }
    .error-msg { color: #a94442; font-size: 11px; margin-top: 3px; }
    .non-field-error {
      background: #ffd7d7;
      border: 1px solid #f5a5a5;
      color: #a94442;
      font-size: 12px;
      padding: 6px 10px;
      margin-bottom: 12px;
    }
    .btn-login {
      width: 100%;
      background: #e8720c;
      color: #fff;
      border: none;
      padding: 8px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-login:hover { background: #d0650b; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    북마트<span>주문관리시스템</span>
  </div>
  <div class="login-body">
    <form method="post">
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="non-field-error">{{ form.non_field_errors.0 }}</div>
      {% endif %}
      <div class="field-row">
        <label>아이디</label>
        {{ form.username }}
        {% if form.username.errors %}
          <div class="error-msg">{{ form.username.errors.0 }}</div>
        {% endif %}
      </div>
      <div class="field-row">
        <label>비밀번호</label>
        {{ form.password }}
        {% if form.password.errors %}
          <div class="error-msg">{{ form.password.errors.0 }}</div>
        {% endif %}
      </div>
      <button type="submit" class="btn-login">로그인</button>
    </form>
  </div>
</div>
</body>
</html>
