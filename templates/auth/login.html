<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 — 북마트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      font-size: 14px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-wrap {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .login-header {
      background: #1e293b;
      color: #fff;
      text-align: center;
      padding: 28px 0 22px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .login-header span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: #94a3b8;
      margin-top: 6px;
      letter-spacing: 0;
    }
    .login-body { padding: 28px 32px 32px; }
    .field-row { margin-bottom: 16px; }
    .field-row label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .field-row input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field-row input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .error-msg { color: #dc2626; font-size: 12px; margin-top: 4px; }
    .non-field-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #991b1b;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      border-left: 4px solid #dc2626;
    }
    .btn-login {
      width: 100%;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-login:hover { background: #1e3a8a; transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
    .btn-login:active { transform: translateY(0); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    북마트<span>주문관리시스템</span>
  </div>
  <div class="login-body">
    <form method="post">
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="non-field-error">{{ form.non_field_errors.0 }}</div>
      {% endif %}
      <div class="field-row">
        <label>아이디</label>
        {{ form.username }}
        {% if form.username.errors %}
          <div class="error-msg">{{ form.username.errors.0 }}</div>
        {% endif %}
      </div>
      <div class="field-row">
        <label>비밀번호</label>
        {{ form.password }}
        {% if form.password.errors %}
          <div class="error-msg">{{ form.password.errors.0 }}</div>
        {% endif %}
      </div>
      <button type="submit" class="btn-login">로그인</button>
    </form>
  </div>
</div>
</body>
</html>
