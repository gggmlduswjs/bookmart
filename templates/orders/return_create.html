{% extends 'base.html' %}
{% block title %}반품 신청{% endblock %}

{% block extra_css %}
<style>
  .order-row-wrap select, .order-row-wrap input[type=number] {
    padding: 3px 5px; border: 1px solid #bbb;
    font-size: 12px; font-family: inherit; height: 26px;
  }
  .order-row-wrap select { width: 100%; }
  .order-row-wrap input[type=number] { width: 60px; text-align: center; }
</style>
{% endblock %}

{% block content %}
<div class="page-title">
  반품 신청
  <span class="subtitle">배송지: {{ delivery.name }}</span>
</div>

<div class="msg-box msg-warning">⚠ 판본도(is_returnable=아니오) 교재는 반품이 불가하여 목록에 표시되지 않습니다.</div>

<form method="post" x-data="orderForm()" @submit.prevent="submitOrder">
  {% csrf_token %}
  <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

  <div class="order-row-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th style="width:28%">시리즈</th>
          <th style="width:34%">교재</th>
          <th class="right" style="width:90px">단가</th>
          <th class="center" style="width:70px">수량</th>
          <th class="right" style="width:90px">금액</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody>
        <template x-for="(row, index) in rows" :key="index">
          <tr>
            <td>
              <select x-model="row.series" @change="row.book_id = ''; row.unit_price = 0">
                <option value="">시리즈 선택</option>
                {% for s in series_list %}
                <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
              </select>
            </td>
            <td>
              <select x-model="row.book_id" @change="updatePrice(row)">
                <option value="">교재 선택</option>
                <template x-for="b in getBooks(row.series)" :key="b.id">
                  <option :value="b.id" x-text="b.name"></option>
                </template>
              </select>
              <input type="hidden" :name="'book_' + index" :value="row.book_id">
            </td>
            <td class="right"><span x-text="row.unit_price ? row.unit_price.toLocaleString() + '원' : '-'" style="color:#666"></span></td>
            <td class="center">
              <input type="number" :name="'qty_' + index" x-model.number="row.qty" min="1" max="9999">
            </td>
            <td class="right" style="font-weight:bold">
              <span x-text="rowAmount(row) ? rowAmount(row).toLocaleString() + '원' : '-'"></span>
            </td>
            <td class="center">
              <button type="button" class="btn btn-sm btn-red" @click="rows.splice(index, 1)" x-show="rows.length > 1" style="padding:1px 6px">✕</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <div class="order-total-bar">
    <button type="button" class="btn btn-outline btn-sm" @click="addRow" style="float:left">+ 행 추가</button>
    반품 합계: <span x-text="total().toLocaleString()" style="font-size:15px;color:#e8720c"></span>원
  </div>

  <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
    <label style="white-space:nowrap;background:#777;color:#fff;padding:3px 8px;font-size:12px">메모</label>
    <input type="text" name="memo" style="flex:1;padding:4px 8px;border:1px solid #bbb;font-size:12px" placeholder="반품 사유">
  </div>
  <div style="margin-top:12px">
    <button type="submit" class="btn btn-orange" style="padding:6px 30px">반품 신청</button>
    <a href="{% url 'return_list' %}" class="btn btn-outline" style="margin-left:8px">취소</a>
  </div>
</form>
{% endblock %}

{% block extra_js %}
<script>
const BOOKS = {{ books_json|safe }};
function orderForm() {
  return {
    rows: [{ series: '', book_id: '', qty: 1, unit_price: 0 }],
    getBooks(series) { return series ? BOOKS.filter(b => b.series === series) : BOOKS; },
    updatePrice(row) { const b = BOOKS.find(b => b.id == row.book_id); row.unit_price = b ? b.unit_price : 0; },
    rowAmount(row) { return (row.book_id && row.qty) ? row.unit_price * row.qty : 0; },
    total() { return this.rows.reduce((s, r) => s + this.rowAmount(r), 0); },
    addRow() { this.rows.push({ series: '', book_id: '', qty: 1, unit_price: 0 }); },
    submitOrder() {
      if (!this.rows.some(r => r.book_id && r.qty > 0)) { alert('반품할 교재를 선택하세요.'); return; }
      this.$el.submit();
    }
  }
}
</script>
{% endblock %}
