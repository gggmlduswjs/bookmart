{% extends 'base.html' %}
{% block title %}주문 취소 확인{% endblock %}

{% block content %}
<div class="page-title">주문 취소 확인</div>

<div class="content-box" style="max-width:380px">
  <div style="padding:20px 20px 10px">
    <p style="margin-bottom:8px">주문 <strong>{{ order.order_no }}</strong>을 취소하시겠습니까?</p>
    <p style="color:#888;font-size:12px;margin-bottom:16px">취소 후에는 되돌릴 수 없습니다.</p>
    <form method="post">
      {% csrf_token %}
      <div style="display:flex;gap:8px">
        <button type="submit" class="btn btn-red">취소 확정</button>
        <a href="{% url 'order_detail' order.pk %}" class="btn btn-outline">돌아가기</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
