{% extends 'base.html' %}
{% block title %}주문 취소 확인{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white">주문 취소 확인</div>
      <div class="card-body">
        <p>주문 <strong>{{ order.order_no }}</strong>을 취소하시겠습니까?</p>
        <p class="text-muted small">취소 후에는 되돌릴 수 없습니다.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">취소 확정</button>
            <a href="{% url 'order_detail' order.pk %}" class="btn btn-outline-secondary">돌아가기</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
