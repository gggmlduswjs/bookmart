{# 교재 테이블 JS 믹스인 — bookTableMixin()
   사용법: {% include 'orders/_partials/book_table_js.html' %}
   각 페이지에서 x-data 함수에 ...bookTableMixin() 스프레드
   전제: BOOKS 상수가 먼저 선언되어 있어야 함 #}

<script>
function bookTableMixin() {
  return {
    rows: [{ series: '', book_id: '', qty: 1, unit_price: 0, is_custom: false }],
    excelLoading: false,
    excelUnmatched: [],

    getBooks(series) {
      return series ? BOOKS.filter(b => b.series === series) : BOOKS;
    },
    updatePrice(row) {
      const b = BOOKS.find(b => b.id == row.book_id);
      row.unit_price = b ? b.unit_price : 0;
    },
    rowAmount(row) {
      return ((row.book_id || row.is_custom) && row.qty) ? row.unit_price * row.qty : 0;
    },
    total() {
      return this.rows.reduce((s, r) => s + this.rowAmount(r), 0);
    },
    addRow() {
      this.rows.push({ series: '', book_id: '', qty: 1, unit_price: 0, is_custom: false });
    },
    addCustomRow() {
      this.rows.push({ is_custom: true, custom_name: '', qty: 1, unit_price: 0 });
    },

    async uploadExcel(e) {
      const file = e.target.files[0];
      if (!file) return;
      this.excelLoading = true;
      this.excelUnmatched = [];
      const fd = new FormData();
      fd.append('file', file);
      fd.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
      try {
        const res = await fetch('{% url "parse_order_excel" %}', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }
        // 메타데이터 자동 입력 (업체/학교/선생님/주소/전화)
        if (data.meta && typeof this._applyExcelMeta === 'function') {
          this._applyExcelMeta(data.meta);
        }
        // 기존 빈 행 제거
        this.rows = this.rows.filter(r => r.book_id || (r.is_custom && r.custom_name));
        const sampleItems = [];
        if (data.matched && data.matched.length) {
          for (const m of data.matched) {
            if (m.is_sample) { sampleItems.push(m.name); continue; }
            this.rows.push({ series: m.series || '', book_id: String(m.id), qty: m.qty, unit_price: m.unit_price, is_custom: false });
          }
        }
        if (data.unmatched && data.unmatched.length) {
          this.excelUnmatched = data.unmatched.filter(u => !u.is_sample);
          for (const u of data.unmatched) {
            if (u.is_sample) { sampleItems.push(u.name); continue; }
            this.rows.push({ is_custom: true, custom_name: u.name, qty: u.qty, unit_price: u.excel_price || 0 });
          }
        }
        if (!this.rows.length) this.rows.push({ series: '', book_id: '', qty: 1, unit_price: 0, is_custom: false });
        const mc = data.matched?.filter(x => !x.is_sample).length || 0;
        const uc = data.unmatched?.filter(x => !x.is_sample).length || 0;
        let msg = (mc || uc) ? `${mc}건 매칭 완료` + (uc ? `, ${uc}건 직접입력 추가` : '') : '매칭된 교재가 없습니다.';
        if (sampleItems.length) msg += `\n\n샘플교재: ${sampleItems.join(', ')}`;
        if (data.meta) {
          const parts = [];
          if (data.meta.school) parts.push(`학교: ${data.meta.school}`);
          if (data.meta.teacher) parts.push(`선생님: ${data.meta.teacher}`);
          if (data.meta.address) parts.push(`주소: ${data.meta.address}`);
          if (parts.length) msg += `\n\n자동입력: ${parts.join(', ')}`;
        }
        alert(msg);
      } catch (err) { alert('업로드 실패: ' + err.message); }
      finally { this.excelLoading = false; e.target.value = ''; }
    },
  };
}
</script>
